<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deteksi Uang AI</title>

    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            color: #38bdf8;
        }

        p {
            color: #cbd5e1;
            margin-bottom: 20px;
        }

        .btn-start {
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: linear-gradient(90deg, #22c55e, #16a34a);
            color: white;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .btn-start:hover {
            transform: translateY(-3px);
            opacity: 0.95;
        }

        #status {
            margin: 18px 0;
            padding: 14px;
            width: 640px;
            text-align: center;
            border-radius: 14px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            font-weight: bold;
            color: #f8fafc;
        }

        .container {
            position: relative;
            width: 640px;
            height: 480px;
            border-radius: 18px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.15);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            background: black;
        }

        video,
        canvas#overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 640px;
            height: 480px;
        }

        canvas#overlay {
            z-index: 10;
            pointer-events: none;
        }

        .legend {
            margin-top: 18px;
            display: flex;
            gap: 20px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .box {
            width: 18px;
            height: 18px;
            border-radius: 4px;
        }

        .paper {
            background: #22c55e;
        }

        .coin {
            background: #3b82f6;
        }
    </style>
</head>
<body>

    <h1>💰 AI Deteksi Uang</h1>
    <p>Dibuat oleh: Nama Kalian</p>

    <button id="btn-init" class="btn-start">AKTIFKAN KAMERA</button>

    <div id="status">STATUS: NONAKTIF</div>

    <div class="container">
        <video id="webcam" playsinline muted></video>
        <canvas id="overlay" width="640" height="480"></canvas>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="box paper"></div>
            <span>Uang Kertas</span>
        </div>

        <div class="legend-item">
            <div class="box coin"></div>
            <span>Uang Logam</span>
        </div>
    </div>

    <canvas id="processor" width="640" height="640" style="display:none;"></canvas>

    <script src="app.js"></script>
</body>
</html>
