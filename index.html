<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Deteksi Uang</title>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top,#1e3a8a,#020617 70%);

    color:white;
}

.main{
    width:90%;
    max-width:760px;

    background:rgba(255,255,255,0.05);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.1);

    border-radius:25px;

    padding:25px;

    box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    font-size:2rem;
    margin-bottom:8px;
}

.creator{
    text-align:center;
    color:#93c5fd;
    margin-bottom:20px;
    font-size:0.95rem;
}

.top{
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;

    margin-bottom:20px;
}

button{
    padding:14px 28px;

    border:none;
    border-radius:14px;

    background:linear-gradient(135deg,#2563eb,#3b82f6);

    color:white;

    font-weight:600;
    font-size:1rem;

    cursor:pointer;

    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
}

#status{
    padding:14px 22px;

    border-radius:14px;

    background:#1e293b;

    border:1px solid rgba(255,255,255,0.1);

    font-weight:600;

    display:flex;
    align-items:center;
}

.active-status{
    background:#14532d;
    border:1px solid #22c55e;
    color:#bbf7d0;
}

.container{
    position:relative;

    width:100%;
    aspect-ratio:4/3;

    overflow:hidden;

    border-radius:20px;

    background:black;

    border:2px solid rgba(255,255,255,0.1);
}

video,
#overlay{
    position:absolute;
    inset:0;

    width:100%;
    height:100%;

    object-fit:cover;
}

#overlay{
    z-index:10;
}

.frame{
    position:absolute;
    inset:15px;

    border:2px dashed rgba(255,255,255,0.2);

    border-radius:15px;

    z-index:5;
}

@media(max-width:700px){

    h1{
        font-size:1.5rem;
    }

    .top{
        flex-direction:column;
    }

    button,
    #status{
        width:100%;
        justify-content:center;
    }
}

</style>
</head>

<body>

<div class="main">

    <h1>💵 AI Deteksi Uang</h1>

    <div class="creator">
        By Dwi Alpi
    </div>

    <div class="top">

        <button id="btn-init">
            Aktifkan Kamera
        </button>

        <div id="status">
            🔴 Sistem Mati
        </div>

    </div>

    <div class="container">

        <video id="webcam" autoplay playsinline muted></video>

        <canvas id="overlay" width="640" height="480"></canvas>

        <div class="frame"></div>

    </div>

</div>

<canvas id="processor" width="640" height="640" style="display:none;"></canvas>

<script src="app.js"></script>

<script>

const btn = document.getElementById("btn-init");
const statusBox = document.getElementById("status");

btn.addEventListener("click",()=>{

    statusBox.innerHTML = "🟢 Sistem Aktif";
    statusBox.classList.add("active-status");

});

</script>

</body>
</html>
