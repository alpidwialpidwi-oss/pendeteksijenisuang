<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deployment AI Siswa</title>

    <!-- ONNX Runtime -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:
            radial-gradient(circle at top,#1e293b,#020617 70%);
            color:white;
            font-family:'Courier New', Courier, monospace;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding:25px;
            min-height:100vh;
        }

        h1{
            margin-top:10px;
            font-size:2.2rem;
            text-align:center;
            color:#ffffff;
            text-shadow:0 0 15px rgba(255,255,255,0.3);
        }

        .creator{
            margin-top:10px;
            margin-bottom:20px;
            font-size:1rem;
            color:#93c5fd;
            background:rgba(59,130,246,0.15);
            padding:8px 18px;
            border-radius:30px;
            border:1px solid rgba(147,197,253,0.3);
            box-shadow:0 0 15px rgba(59,130,246,0.15);
        }

        .btn-start{
            padding:14px 32px;
            font-size:1rem;
            cursor:pointer;
            background:linear-gradient(135deg,#ef4444,#dc2626);
            color:white;
            border:none;
            border-radius:12px;
            font-weight:bold;
            transition:0.3s;
            box-shadow:0 8px 20px rgba(239,68,68,0.35);
        }

        .btn-start:hover{
            transform:translateY(-3px);
            box-shadow:0 12px 25px rgba(239,68,68,0.45);
        }

        #status{
            margin:18px;
            padding:14px;
            border-radius:12px;
            background:#1e1e1e;
            border:1px solid #444;
            width:640px;
            text-align:center;
            font-weight:bold;
            transition:0.4s;
            letter-spacing:1px;
        }

        /* WARNA SAAT SISTEM AKTIF */
        .active-status{
            background:linear-gradient(135deg,#16a34a,#22c55e);
            color:white;
            border:1px solid #4ade80;
            box-shadow:0 0 25px rgba(34,197,94,0.5);
            animation:glow 1.5s infinite alternate;
        }

        @keyframes glow{
            from{
                box-shadow:0 0 10px rgba(34,197,94,0.4);
            }
            to{
                box-shadow:0 0 25px rgba(34,197,94,0.9);
            }
        }

        .container{
            position:relative;
            width:640px;
            height:480px;
            border:2px solid rgba(255,255,255,0.15);
            border-radius:18px;
            overflow:hidden;
            background:#000;
            box-shadow:0 15px 35px rgba(0,0,0,0.5);
        }

        video,
        canvas#overlay{
            position:absolute;
            top:0;
            left:0;
            width:640px;
            height:480px;
        }

        canvas#overlay{
            z-index:10;
            pointer-events:none;
        }

        .camera-frame{
            position:absolute;
            inset:15px;
            border:2px dashed rgba(255,255,255,0.2);
            border-radius:15px;
            z-index:5;
        }

        @media(max-width:700px){

            .container,
            video,
            canvas#overlay,
            #status{
                width:100%;
                max-width:100%;
            }

            .container{
                height:auto;
                aspect-ratio:4/3;
            }

            h1{
                font-size:1.5rem;
            }
        }
    </style>
</head>

<body>

    <h1>🛡️ Proyek AI: Deteksi Jenis Uang</h1>

    <!-- BY DWI ALPI -->
    <div class="creator">
        ✨ By : Dwi Alpi
    </div>

    <button id="btn-init" class="btn-start">
        AKTIFKAN KAMERA
    </button>

    <div id="status">
        🔴 STATUS : MATI
    </div>

    <div class="container">

        <!-- Kamera -->
        <video id="webcam" playsinline muted autoplay></video>

        <!-- Overlay -->
        <canvas id="overlay" width="640" height="480"></canvas>

        <!-- Dekorasi -->
        <div class="camera-frame"></div>
    </div>

    <!-- Canvas Processor -->
    <canvas id="processor" width="640" height="640" style="display:none;"></canvas>

    <!-- Script AI -->
    <script src="app.js"></script>

    <!-- Efek status aktif -->
    <script>
        const btn = document.getElementById("btn-init");
        const statusBox = document.getElementById("status");

        btn.addEventListener("click", () => {
            statusBox.innerHTML = "🟢 STATUS : SISTEM AKTIF";
            statusBox.classList.add("active-status");
        });
    </script>

</body>
</html>
