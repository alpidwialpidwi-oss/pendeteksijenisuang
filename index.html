<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Deteksi Uang</title>

    <!-- ONNX Runtime -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px;
            min-height: 100vh;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            color: #38bdf8;
            text-shadow: 0 0 15px rgba(56,189,248,0.5);
        }

        p {
            color: #cbd5e1;
            margin-bottom: 20px;
        }

        .btn-start {
            padding: 14px 35px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #22c55e, #16a34a);
            color: white;
            transition: 0.3s;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(34,197,94,0.4);
        }

        .btn-start:hover {
            transform: scale(1.05);
            background: linear-gradient(90deg, #16a34a, #15803d);
        }

        #status {
            width: 640px;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            background: rgba(15,23,42,0.8);
            border: 1px solid #334155;
            font-weight: bold;
            color: #f8fafc;
        }

        .container {
            position: relative;
            width: 640px;
            height: 480px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid #334155;
            box-shadow: 0 10px 35px rgba(0,0,0,0.5);
        }

        video, canvas#overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 640px;
            height: 480px;
        }

        canvas#overlay {
            z-index: 10;
            pointer-events: none;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-top: 18px;
            font-size: 0.95rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.08);
            padding: 8px 14px;
            border-radius: 10px;
        }

        .color-box {
            width: 18px;
            height: 18px;
            border-radius: 4px;
        }

        .green {
            background: #22c55e;
        }

        .blue {
            background: #3b82f6;
        }
    </style>
</head>
<body>

    <h1>💸 AI Deteksi Uang Indonesia</h1>
    <p>Dibuat oleh: Nama Kalian</p>

    <button id="btn-init" class="btn-start">AKTIFKAN KAMERA</button>

    <div id="status">STATUS: MATI</div>

    <div class="container">
        <video id="webcam" playsinline muted></video>
        <canvas id="overlay" width="640" height="480"></canvas>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="color-box green"></div>
            <span>Uang Kertas</span>
        </div>

        <div class="legend-item">
            <div class="color-box blue"></div>
            <span>Uang Logam</span>
        </div>
    </div>

    <!-- Canvas hidden -->
    <canvas id="processor" width="640" height="640" style="display:none;"></canvas>

    <script src="app.js"></script>
</body>
</html>
